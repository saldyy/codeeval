services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: codeeval
      POSTGRES_PASSWORD: codeeval
      POSTGRES_DB: codeeval
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  # Sandboxed code execution. Privileged mode is required by Piston for its
  # isolate/cgroups-based sandboxing - this is a real, non-default Docker
  # requirement, not an oversight.
  piston:
    image: ghcr.io/engineer-man/piston
    ports:
      - "2000:2000"
    privileged: true
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /tmp:exec

volumes:
  pgdata:
  piston-packages:
