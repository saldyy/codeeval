{{define "login.html"}}
{{template "header" .}}
<div class="login-box">
  <h1>Log in</h1>
  <form method="POST" action="/login">
    <label>Email</label>
    <input type="email" name="email" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Log in</button>
  </form>
</div>
{{template "footer" .}}
{{end}}
